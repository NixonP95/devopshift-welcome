apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: crypto
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: nixonp95/crypto-frontend:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5002