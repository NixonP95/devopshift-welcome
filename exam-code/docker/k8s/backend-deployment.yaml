apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: crypto
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nixonp95/crypto-backend:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          env:
            - name: MYSQL_HOST
              value: "mysqldb"
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_DB
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DB